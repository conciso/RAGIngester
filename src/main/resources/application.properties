spring.application.name=RAGIngester

# Defaults for all RAGINGESTER_* env-vars
ragingester.clean-docs-path=/data/clean
ragingester.poisoned-docs-path=/data/poisoned
ragingester.testcases-path=/app/testcases
ragingester.reports-path=/app/reports
ragingester.override-env-path=/config/override.env
ragingester.ragchecker-image=ragchecker:latest
ragingester.ragchecker-env-file=/config/ragchecker.env
ragingester.polling-timeout-minutes=10
ragingester.dry-run=false
# Comma-separated stages to run, e.g. P25PCT,P50PCT. Empty = all stages.
ragingester.stages=
