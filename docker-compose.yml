services:
  ragingester:
    build: .
    env_file: .env
    volumes:
      - ./data:/data:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/lightrag/override.env:/config/override.env:ro
      - /opt/ragchecker/ragchecker.env:/config/ragchecker.env:ro
    networks:
      - aibox_network

networks:
  aibox_network:
    external: true
